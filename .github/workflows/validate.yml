name: validate

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure fixture Git identity
        shell: bash
        run: |
          git config --global user.name "Agentic Pipeline CI"
          git config --global user.email "ci@example.invalid"

      - name: Legacy package validator
        shell: bash
        run: bash scripts/bash/validate-package.sh

      - name: Hard package validator
        shell: pwsh
        run: ./scripts/windows/Validate-AgenticPipelinePackage.ps1 -RepoRoot . -Strict

      - name: Runtime truth validator
        shell: pwsh
        run: ./scripts/windows/Test-RuntimeTruth.ps1 -RepoRoot . -StrictHotPath

      - name: Companion policy and golden evals
        shell: bash
        run: node scripts/companion/companion-control.cjs validate-pack --repo-root .

      - name: Flow restoration routing evals
        shell: bash
        run: node scripts/companion/companion-control.cjs test-flow-restoration --repo-root .

      - name: Flow restoration PowerShell contracts
        shell: pwsh
        run: ./scripts/windows/companion/Test-FlowRestorationContracts.ps1 -RepoRoot .

      - name: Distribution integrity validator
        shell: pwsh
        run: ./scripts/windows/Test-DistributionIntegrity.ps1 -RepoRoot .

      - name: PowerShell parser check
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List *
              throw "PowerShell parser check failed: $($_.FullName)"
            }
          }

      - name: Node syntax check
        shell: bash
        run: find . -name '*.cjs' -not -path './node_modules/*' -print0 | xargs -0 -r -n1 node --check

      - name: Shell syntax check
        shell: bash
        run: find scripts -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Hook contract smoke
        shell: pwsh
        run: ./templates/agy-project-base/.agents/hooks/Test-HookContract.ps1

      - name: Fastpatch synthetic tests
        shell: pwsh
        run: ./scripts/windows/Test-FastPatchSynthetic.ps1 -RepoRoot .

      - name: Independent schema validator self-check
        shell: bash
        run: node tests/acceptance/handshake-schema-contract.cjs --self-check

      - name: Runtime routing acceptance contract
        shell: bash
        run: node tests/acceptance/runtime-routing-contract.cjs

      - name: Runtime handshake acceptance contract
        shell: pwsh
        run: ./tests/acceptance/Test-RuntimeHandshakeAcceptance.ps1 -RepoRoot . -PowerShellExecutable pwsh

      - name: Installation manifest acceptance contract
        shell: pwsh
        run: ./tests/acceptance/Test-InstallationManifestAcceptance.ps1 -RepoRoot . -PowerShellExecutable pwsh

      - name: Release package extraction smoke
        shell: pwsh
        run: ./scripts/windows/Build-ReleasePackage.ps1 -RepoRoot . -OutputRoot "$env:RUNNER_TEMP/agentic-pipeline-release" -Force

      - name: No backup artifacts in repository
        shell: bash
        run: |
          if find . -name '*.bak-*' -o -name '*.bak-v*' | grep -q .; then
            find . -name '*.bak-*' -o -name '*.bak-v*'
            exit 1
          fi

      - name: Git diff whitespace check
        shell: bash
        run: git diff --check

  validate-windows-unicode:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure fixture Git identity
        shell: powershell
        run: |
          git config --global user.name "Agentic Pipeline CI"
          git config --global user.email "ci@example.invalid"

      - name: Independent schema validator self-check
        shell: powershell
        run: node tests/acceptance/handshake-schema-contract.cjs --self-check

      - name: Windows PowerShell 5.1 Unicode acceptance
        shell: powershell
        run: |
          .\tests\acceptance\Test-RuntimeHandshakeAcceptance.ps1 `
            -RepoRoot . `
            -PowerShellExecutable "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" `
            -UnicodeOnly
