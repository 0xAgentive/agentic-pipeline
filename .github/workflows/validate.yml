name: validate

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  package-hard-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hard package validation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "scripts/windows/Validate-AgenticPipelinePackage.ps1") {
            pwsh -NoProfile -File scripts/windows/Validate-AgenticPipelinePackage.ps1 -RepoRoot . -Strict
          } else {
            throw "Missing scripts/windows/Validate-AgenticPipelinePackage.ps1"
          }

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
          done < <(find . -type f -name '*.sh' -print0)
